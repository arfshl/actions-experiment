name: "Analyze"

on:
  workflow_dispatch:
  push:
    branches: main
    paths: 
      - ".github/workflows/analyze.yml"

permissions:
  contents: write  

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Go analyze the rootfs
        run: | 
          wget https://github.com/Alex313031/Thorium-Win/releases/download/M138.0.7204.303/thorium_AVX2_138.0.7204.303.zip
          
          unzip thorium_AVX2_138.0.7204.303.zip 
          
          tree -d $GITHUB_WORKSPACE
        continue-on-error: true
